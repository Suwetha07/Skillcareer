apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: skillcareer-prod
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/suwetha07/skillcareer
    targetRevision: main
    path: skillcareer-infra/k8s/prod   

  destination:
    server: https://kubernetes.default.svc
    namespace: prod

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true