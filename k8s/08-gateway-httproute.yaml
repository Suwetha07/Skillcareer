apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: skillcareer-gateway
  namespace: dev
spec:
  gatewayClassName: kgateway
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: Same
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: skillcareer-route
  namespace: dev
spec:
  parentRefs:
    - name: skillcareer-gateway
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /api
      backendRefs:
        - name: api-gateway
          port: 5000
    - matches:
        - path:
            type: PathPrefix
            value: /user
      backendRefs:
        - name: user-service
          port: 5001
    - matches:
        - path:
            type: PathPrefix
            value: /career
      backendRefs:
        - name: career-service
          port: 5002
    - matches:
        - path:
            type: PathPrefix
            value: /skill
      backendRefs:
        - name: skill-service
          port: 5003
    - matches:
        - path:
            type: PathPrefix
            value: /roadmap
      backendRefs:
        - name: roadmap-service
          port: 5004
    - matches:
        - path:
            type: PathPrefix
            value: /content
      backendRefs:
        - name: content-service
          port: 5005
    - matches:
        - path:
            type: PathPrefix
            value: /progress
      backendRefs:
        - name: progress-service
          port: 5006
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: frontend-ui
          port: 80
---
