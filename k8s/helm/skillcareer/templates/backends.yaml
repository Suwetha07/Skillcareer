{{- range .Values.backends }}
apiVersion: v1
kind: Service
metadata:
  name: {{ .name }}
  namespace: {{ $.Values.namespace }}
spec:
  clusterIP: None
  selector:
    app: {{ .name }}
  ports:
    - port: {{ .port }}
      targetPort: {{ .port }}
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ .name }}
  namespace: {{ $.Values.namespace }}
spec:
  serviceName: {{ .name }}
  replicas: 1
  selector:
    matchLabels:
      app: {{ .name }}
  template:
    metadata:
      labels:
        app: {{ .name }}
    spec:
      initContainers:
        - name: wait-for-mongodb
          image: busybox:1.36
          command: ["sh", "-c", "until nc -z mongodb 27017; do sleep 2; done"]
      containers:
        - name: {{ .name }}
          image: {{ .image }}:{{ .tag }}
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: {{ .port }}
          env:
            - name: PORT
              value: {{ .port | quote }}
            - name: MONGO_URI
              valueFrom:
                secretKeyRef:
                  name: skillcareer-secrets
                  key: {{ .mongoSecretKey }}
            - name: USE_IN_MEMORY_FALLBACK
              valueFrom:
                configMapKeyRef:
                  name: skillcareer-config
                  key: USE_IN_MEMORY_FALLBACK
{{- if .includeJwt }}
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: skillcareer-secrets
                  key: JWT_SECRET
{{- end }}
---
{{- end }}
