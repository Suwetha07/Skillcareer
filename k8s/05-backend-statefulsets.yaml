apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: user-service
  namespace: dev
spec:
  serviceName: user-service
  replicas: 1
  updateStrategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
    spec:
      initContainers:
        - name: wait-for-mongodb
          image: busybox:1.36
          command: ["sh", "-c", "until nc -z mongodb 27017; do echo waiting for mongodb; sleep 2; done"]
      containers:
        - name: user-service
          image: suwetha07/skillcareer-user-service:v1.0.1
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5001
          env:
            - name: PORT
              value: "5001"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: skillcareer-secrets
                  key: JWT_SECRET
            - name: MONGO_URI
              valueFrom:
                secretKeyRef:
                  name: skillcareer-secrets
                  key: USER_SERVICE_MONGO_URI
            - name: USE_IN_MEMORY_FALLBACK
              valueFrom:
                configMapKeyRef:
                  name: skillcareer-config
                  key: USE_IN_MEMORY_FALLBACK
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
          readinessProbe:
            tcpSocket:
              port: 5001
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 5001
            initialDelaySeconds: 15
            periodSeconds: 20
---
