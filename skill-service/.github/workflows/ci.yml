name: Service CI

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]
permissions:
  contents: read
  packages: write
  security-events: write

jobs:
  ci:
    uses: SkillCareer/skill-service/.github/workflows/reusable-ci.yml@main
    with:
      node_version: "18"
      image_name: "skill-service"
    secrets: inherit
