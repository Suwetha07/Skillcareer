{{- $namespace := .Values.namespace | default .Release.Namespace -}}
{{- $mongo := .Values.mongo | default dict -}}
{{- $storage := .Values.storageClass | default dict -}}
{{- $secretName := ((.Values.secrets | default dict).name) | default "skillcareer-secret" -}}
{{- $auth := (get $mongo "auth") | default dict -}}

apiVersion: v1
kind: Service
metadata:
  name: mongodb
  namespace: {{ $namespace }}
spec:
  clusterIP: None
  selector:
    app: mongodb
  ports:
    - port: 27017
      targetPort: 27017

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mongodb
  namespace: {{ $namespace }}
spec:
  serviceName: mongodb
  replicas: 1
  selector:
    matchLabels:
      app: mongodb
  template:
    metadata:
      labels:
        app: mongodb
    spec:
      containers:
        - name: mongodb
          image: {{ get $mongo "image" | default "mongo:7" }}
          ports:
            - containerPort: 27017

{{- if $auth.enabled }}
          env:
            - name: MONGO_INITDB_ROOT_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ $secretName }}
                  key: MONGO_ROOT_USERNAME
            - name: MONGO_INITDB_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ $secretName }}
                  key: MONGO_ROOT_PASSWORD
{{- end }}

          volumeMounts:
            - name: mongodata
              mountPath: /data/db

  volumeClaimTemplates:
    - metadata:
        name: mongodata
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: {{ get $storage "name" | default "csi-standard" }}
        resources:
          requests:
            storage: {{ get $mongo "size" | default "1Gi" }}