name: content-service-ci
on:
  workflow_dispatch:
  push:
    paths:
      - 'services/content-service/**'
      - 'cicd/workflows/content-service-ci.yml'
jobs:
  run:
    uses: ./cicd/workflows/reusable-service-ci.yml
    with:
      service_name: content-service
      context_path: services/content-service
      image_name: suwetha07/skillcareer-content-service
