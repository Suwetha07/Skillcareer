apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: user-service
  namespace: prod
spec:
  serviceName: user-service
  replicas: 1
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
    spec:
      containers:
        - name: user-service
          image: suwetha07/skillcareer-user-service:v1.0.1
          ports:
            - containerPort: 5001
---
