apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: skillcareer-route
  namespace: dev
spec:
  parentRefs:
    - name: skillcareer-gateway
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /api
      backendRefs:
        - name: api-gateway
          port: 5000
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: frontend-ui
          port: 80
