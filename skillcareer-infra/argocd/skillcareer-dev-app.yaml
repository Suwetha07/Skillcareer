apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: skillcareer-dev
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/YOUR_ORG/skillcareer-infra.git
    targetRevision: main
    path: helm/skillcareer
    helm:
      valueFiles:
        - values.yaml
        - values-dev.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
