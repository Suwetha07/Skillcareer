name: Reusable Service CI

on:
  workflow_call:
    inputs:
      node_version:
        description: "Node.js version"
        required: false
        type: string
        default: "18"
      image_name:
        description: "Container image name without registry/org"
        required: true
        type: string
      docker_context:
        description: "Docker build context"
        required: false
        type: string
        default: "."
      dockerfile:
        description: "Dockerfile path"
        required: false
        type: string
        default: "Dockerfile"
      run_trivy:
        description: "Run Trivy image scan"
        required: false
        type: boolean
        default: true
      push_image:
        description: "Push image to GHCR"
        required: false
        type: boolean
        default: true

concurrency:
  group: ci-${{ github.repository }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      security-events: write
    env:
      IMAGE_REF: ghcr.io/${{ github.repository_owner }}/${{ inputs.image_name }}:${{ github.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Lint
        run: npm run lint --if-present

      - name: Test
        run: npm test --if-present

      - name: Resolve Optional Checks
        id: checks
        shell: bash
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
        run: |
          if [ -n "$SONAR_TOKEN" ] && [ -n "$SONAR_HOST_URL" ]; then
            echo "run_sonar=true" >> "$GITHUB_OUTPUT"
          else
            echo "run_sonar=false" >> "$GITHUB_OUTPUT"
          fi

          if [ -n "$SNYK_TOKEN" ]; then
            echo "run_snyk=true" >> "$GITHUB_OUTPUT"
          else
            echo "run_snyk=false" >> "$GITHUB_OUTPUT"
          fi

          if [ -n "$WEBHOOK_URL" ]; then
            echo "run_slack=true" >> "$GITHUB_OUTPUT"
          else
            echo "run_slack=false" >> "$GITHUB_OUTPUT"
          fi

      - name: SonarQube Scan
        if: ${{ steps.checks.outputs.run_sonar == 'true' }}
        uses: SonarSource/sonarqube-scan-action@v2
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

      - name: Snyk Scan
        if: ${{ steps.checks.outputs.run_snyk == 'true' }}
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          command: test

      - name: Login to GHCR
        if: ${{ inputs.push_image }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker Image
        run: |
          docker build \
            -f "${{ inputs.dockerfile }}" \
            -t "${IMAGE_REF}" \
            "${{ inputs.docker_context }}"

      - name: Trivy Scan
        if: ${{ inputs.run_trivy }}
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_REF }}
          format: table
          exit-code: 1
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL,HIGH

      - name: Push Image to GHCR
        if: ${{ inputs.push_image }}
        run: docker push "${IMAGE_REF}"

      - name: Slack Notify Success
        if: ${{ success() && steps.checks.outputs.run_slack == 'true' }}
        uses: slackapi/slack-github-action@v1.27.0
        with:
          payload: |
            {
              "text": "CI SUCCESS: ${{ github.repository }} on ${{ github.ref_name }} (${{ github.sha }}) -> ${{ env.IMAGE_REF }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}

      - name: Slack Notify Failure
        if: ${{ failure() && steps.checks.outputs.run_slack == 'true' }}
        uses: slackapi/slack-github-action@v1.27.0
        with:
          payload: |
            {
              "text": "CI FAILED: ${{ github.repository }} on ${{ github.ref_name }} (${{ github.sha }})"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
