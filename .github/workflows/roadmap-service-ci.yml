name: roadmap-service-ci
on:
  workflow_dispatch:
  push:
    paths:
      - 'services/roadmap-service/**'
      - '.github/workflows/roadmap-service-ci.yml'
jobs:
  run:
    uses: ./.github/workflows/reusable-service-ci.yml
    with:
      service_name: roadmap-service
      context_path: services/roadmap-service
      image_name: suwetha07/skillcareer-roadmap-service
