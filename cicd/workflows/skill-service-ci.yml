name: skill-service-ci
on:
  workflow_dispatch:
  push:
    paths:
      - 'services/skill-service/**'
      - 'cicd/workflows/skill-service-ci.yml'
jobs:
  run:
    uses: ./cicd/workflows/reusable-service-ci.yml
    with:
      service_name: skill-service
      context_path: services/skill-service
      image_name: suwetha07/skillcareer-skill-service
